<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Game Price Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
</head>
<body>
    <header class="navbar">
        <div class="container nav-inner">
            <a href="/" class="brand">Game Price Tracker</a>

            <nav class="nav-links">
                <a href="/" class="nav-link {% block nav_home %}{% endblock %}">Search</a>
                <a href="/tracked-games-page" class="nav-link {% block nav_tracked %}{% endblock %}">Tracked Games</a>
            </nav>
        </div>
    </header>

    <main class="page">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
